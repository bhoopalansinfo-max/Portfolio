<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        section {
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f4f4f4;
            border-radius: 8px;
        }
        
        section h2 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
        <p>Showcasing my projects and skills</p>
    </header>
    
    <container>
        <section>
            <h2>About Me</h2>
            <p>Hello! I'm a developer passionate about creating amazing web experiences.</p>
        </section>
        
        <section>
            <h2>Projects</h2>
            <p>Check out my latest projects and contributions.</p>
        </section>
        
        <section>
            <h2>Skills</h2>
            <p>HTML, CSS, JavaScript, and more...</p>
        </section>
    </container>
    
    <footer>
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
    </footer>
</body>
</html>
